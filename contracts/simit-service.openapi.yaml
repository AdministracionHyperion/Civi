openapi: 3.1.0
info:
  title: Civi SIMIT Service
  version: 0.1.0
paths:
  /health/live:
    get:
      responses:
        "200":
          description: service is alive
  /health/ready:
    get:
      responses:
        "200":
          description: service is ready
  /internal/status:
    get:
      summary: Internal service status
      security:
        - internalBearer: []
      responses:
        "200":
          description: internal status
  /internal/simit/multas:
    post:
      summary: Check normalized SIMIT fines and tickets
      security:
        - internalBearer: []
      responses:
        "200":
          description: normalized SIMIT result
  /internal/simit/multas/manizales:
    post:
      summary: Check Manizales local fines portal
      security:
        - internalBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                documento:
                  type: string
                placa:
                  type: string
      responses:
        "200":
          description: Manizales multas result
        "502":
          description: Manizales provider unavailable
components:
  securitySchemes:
    internalBearer:
      type: http
      scheme: bearer
