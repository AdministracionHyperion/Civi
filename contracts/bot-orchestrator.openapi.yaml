openapi: 3.1.0
info:
  title: Civi Bot Orchestrator
  version: 0.1.0
paths:
  /health/live:
    get:
      responses:
        "200":
          description: service is alive
  /health/ready:
    get:
      responses:
        "200":
          description: service is ready
  /internal/status:
    get:
      summary: Internal service status
      security:
        - internalBearer: []
      responses:
        "200":
          description: internal status
  /internal/agent/turns:
    post:
      summary: Execute LLM agent loop for one turn
      security:
        - internalBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_key, text]
              properties:
                user_key:
                  type: string
                text:
                  type: string
                channel:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: agent result
          content:
            application/json:
              schema:
                type: object
                required: [text, state_version, mode]
                properties:
                  text:
                    type: string
                  state_version:
                    type: integer
                  mode:
                    type: string
                  tool_calls:
                    type: array
                    items:
                      type: string
components:
  securitySchemes:
    internalBearer:
      type: http
      scheme: bearer
