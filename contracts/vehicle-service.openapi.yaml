openapi: 3.1.0
info:
  title: Civi Vehicle Service
  version: 0.1.0
paths:
  /health/live:
    get:
      responses:
        "200":
          description: service is alive
  /health/ready:
    get:
      responses:
        "200":
          description: service is ready
  /internal/status:
    get:
      summary: Internal service status
      security:
        - internalBearer: []
      responses:
        "200":
          description: internal status
  /internal/vehicles/vigencia:
    post:
      summary: Check SOAT/RTM vigencia by plate and document
      security:
        - internalBearer: []
      responses:
        "200":
          description: normalized vigencia result
  /internal/vehicles/multas:
    post:
      summary: Check normalized fines by document or plate
      security:
        - internalBearer: []
      responses:
        "200":
          description: normalized fines result
  /internal/vehicles/runt-profile:
    post:
      summary: Check normalized RUNT person profile by document
      security:
        - internalBearer: []
      responses:
        "200":
          description: normalized RUNT person profile result
components:
  securitySchemes:
    internalBearer:
      type: http
      scheme: bearer
