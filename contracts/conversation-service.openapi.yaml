openapi: 3.1.0
info:
  title: Civi Conversation Service
  version: 0.1.0
paths:
  /health/live:
    get:
      responses:
        "200":
          description: service is alive
  /health/ready:
    get:
      responses:
        "200":
          description: service is ready
  /internal/status:
    get:
      summary: Internal service status
      security:
        - internalBearer: []
      responses:
        "200":
          description: internal status
  /internal/conversations/turns:
    post:
      summary: Run one user conversation turn
      security:
        - internalBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_key, text]
              properties:
                user_key:
                  type: string
                text:
                  type: string
                channel:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: final channel reply
  /internal/conversations/history:
    get:
      summary: List recent conversation turns for a user
      security:
        - internalBearer: []
      parameters:
        - name: user_key
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: conversation history
  /internal/conversations/consent:
    post:
      summary: Update conversation consent status
      security:
        - internalBearer: []
      responses:
        "200":
          description: consent updated
    get:
      summary: Read conversation consent status
      security:
        - internalBearer: []
      parameters:
        - name: user_key
          in: query
          required: true
          schema:
            type: string
        - name: channel
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: consent status
components:
  securitySchemes:
    internalBearer:
      type: http
      scheme: bearer
