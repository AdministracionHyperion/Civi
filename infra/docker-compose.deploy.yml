services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - civi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required} -d ${POSTGRES_DB:?POSTGRES_DB is required}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - civi_redis_data:/data

  channel-gateway:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.python-service
      args:
        SERVICE_PATH: services/channel-gateway
        SERVICE_MODULE: channel_gateway.main:app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8080
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      CONVERSATION_SERVICE_URL: http://conversation-service:8081
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:?WHATSAPP_VERIFY_TOKEN is required}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      WHATSAPP_SIGNATURE_REQUIRED: ${WHATSAPP_SIGNATURE_REQUIRED:-true}
      CHANNEL_PUBLIC_RATE_LIMIT_ENABLED: ${CHANNEL_PUBLIC_RATE_LIMIT_ENABLED:-true}
      CHANNEL_PUBLIC_RATE_LIMIT_MAX: ${CHANNEL_PUBLIC_RATE_LIMIT_MAX:-60}
      CHANNEL_PUBLIC_RATE_LIMIT_WINDOW_SECONDS: ${CHANNEL_PUBLIC_RATE_LIMIT_WINDOW_SECONDS:-60}
      CHANNEL_CORS_ALLOWED_ORIGINS: ${CHANNEL_CORS_ALLOWED_ORIGINS:-}
      EVENT_PUBLISHER_MODE: ${EVENT_PUBLISHER_MODE:-redis}
      EVENT_REDIS_URL: ${EVENT_REDIS_URL:?EVENT_REDIS_URL is required}
      EVENT_CHANNEL_PREFIX: ${EVENT_CHANNEL_PREFIX:-civi.events}
    ports:
      - "${CHANNEL_BIND:-0.0.0.0}:${CHANNEL_GATEWAY_PORT:-8080}:8080"
    depends_on:
      - conversation-service
      - notification-service
      - redis

  conversation-service:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.python-service
      args:
        SERVICE_PATH: services/conversation-service
        SERVICE_MODULE: conversation_service.main:app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8081
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      BOT_ORCHESTRATOR_URL: http://bot-orchestrator:8082
      CONVERSATION_REPOSITORY_MODE: ${CONVERSATION_REPOSITORY_MODE:-sql}
      CONVERSATION_DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      CONVERSATION_AUTO_CREATE_SCHEMA: ${CONVERSATION_AUTO_CREATE_SCHEMA:-true}
      CONVERSATION_LLM_HISTORY_TURNS: ${CONVERSATION_LLM_HISTORY_TURNS:-4}
      EVENT_PUBLISHER_MODE: ${EVENT_PUBLISHER_MODE:-redis}
      EVENT_REDIS_URL: ${EVENT_REDIS_URL:?EVENT_REDIS_URL is required}
      EVENT_CHANNEL_PREFIX: ${EVENT_CHANNEL_PREFIX:-civi.events}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      bot-orchestrator:
        condition: service_started

  bot-orchestrator:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.python-service
      args:
        SERVICE_PATH: services/bot-orchestrator
        SERVICE_MODULE: bot_orchestrator.main:app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8082
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      LLM_PROVIDER_MODE: ${LLM_PROVIDER_MODE:?LLM_PROVIDER_MODE is required}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
      OPENAI_LLM_MODEL: ${OPENAI_LLM_MODEL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      VEHICLE_SERVICE_URL: http://vehicle-service:8083
      PLACES_SERVICE_URL: http://places-service:8085
      APPOINTMENT_SERVICE_URL: http://appointment-service:8086
      MEDIA_SERVICE_URL: http://media-service:8088
      KNOWLEDGE_SERVICE_URL: http://knowledge-service:8094
      QUOTE_SERVICE_URL: http://quote-service:8091
      BILLING_SERVICE_URL: http://billing-service:8092
      HANDOFF_SERVICE_URL: http://handoff-service:8093
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      BOT_CONSULT_REPOSITORY_MODE: ${BOT_CONSULT_REPOSITORY_MODE:-sql}
      BOT_CONSULT_DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      BOT_CONSULT_AUTO_CREATE_SCHEMA: ${BOT_CONSULT_AUTO_CREATE_SCHEMA:-true}
    depends_on:
      postgres:
        condition: service_healthy
      vehicle-service:
        condition: service_started
      places-service:
        condition: service_started
      appointment-service:
        condition: service_started
      media-service:
        condition: service_started
      knowledge-service:
        condition: service_started
      quote-service:
        condition: service_started
      billing-service:
        condition: service_started
      handoff-service:
        condition: service_started
      notification-service:
        condition: service_started

  vehicle-service:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.python-service
      args:
        SERVICE_PATH: services/vehicle-service
        SERVICE_MODULE: vehicle_service.main:app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8083
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      RUNT_SERVICE_URL: http://runt-service:8084
      SIMIT_SERVICE_URL: http://simit-service:8090
      VEHICLE_CACHE_MODE: ${VEHICLE_CACHE_MODE:-sql}
      VEHICLE_DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      VEHICLE_AUTO_CREATE_SCHEMA: ${VEHICLE_AUTO_CREATE_SCHEMA:-true}
    depends_on:
      postgres:
        condition: service_healthy
      runt-service:
        condition: service_started
      simit-service:
        condition: service_started

  runt-service:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.browser-service
      args:
        SERVICE_PATH: services/runt-service
        SERVICE_MODULE: runt_service.main:app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8084
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      RUNT_PROVIDER_MODE: ${RUNT_PROVIDER_MODE:?RUNT_PROVIDER_MODE is required}
      RUNT_PROVIDER_API_URL: ${RUNT_PROVIDER_API_URL:-}
      RUNT_PROVIDER_TIMEOUT_SECONDS: ${RUNT_PROVIDER_TIMEOUT_SECONDS:-120}
      RUNT_PROVIDER_RETRIES: ${RUNT_PROVIDER_RETRIES:-2}
      RUNT_PERSONA_PROVIDER_MODE: ${RUNT_PERSONA_PROVIDER_MODE:?RUNT_PERSONA_PROVIDER_MODE is required}
      RUNT_PERSONA_PROVIDER_API_URL: ${RUNT_PERSONA_PROVIDER_API_URL:-}
      RUNT_PERSONA_PROVIDER_TIMEOUT_SECONDS: ${RUNT_PERSONA_PROVIDER_TIMEOUT_SECONDS:-120}
      RUNT_PERSONA_PROVIDER_RETRIES: ${RUNT_PERSONA_PROVIDER_RETRIES:-2}
      RUNT_PERSONA_BROWSER_URL: ${RUNT_PERSONA_BROWSER_URL:-https://portalpublico.runt.gov.co/#/consulta-ciudadano-documento/consulta/consulta-ciudadano-documento}
      RUNT_BROWSER_URL: ${RUNT_BROWSER_URL:-https://portalpublico.runt.gov.co/#/consulta-vehiculo/consulta/consulta-ciudadana}
      RUNT_BROWSER_TIMEOUT_SECONDS: ${RUNT_BROWSER_TIMEOUT_SECONDS:-75}
      RUNT_BROWSER_CAPTCHA_RETRIES: ${RUNT_BROWSER_CAPTCHA_RETRIES:-5}
      RUNT_BROWSER_HEADLESS: ${RUNT_BROWSER_HEADLESS:-true}
      RUNT_BROWSER_EXECUTABLE_PATH: ${RUNT_BROWSER_EXECUTABLE_PATH:-}
      CAPTCHA_API_KEY: ${CAPTCHA_API_KEY:-}

  simit-service:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.browser-service
      args:
        SERVICE_PATH: services/simit-service
        SERVICE_MODULE: simit_service.main:app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8090
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      SIMIT_PROVIDER_MODE: ${SIMIT_PROVIDER_MODE:?SIMIT_PROVIDER_MODE is required}
      SIMIT_PROVIDER_API_URL: ${SIMIT_PROVIDER_API_URL:-}
      SIMIT_PROVIDER_TIMEOUT_SECONDS: ${SIMIT_PROVIDER_TIMEOUT_SECONDS:-90}
      SIMIT_PROVIDER_RETRIES: ${SIMIT_PROVIDER_RETRIES:-2}
      SIMIT_BROWSER_URL: ${SIMIT_BROWSER_URL:-https://www.fcm.org.co/simit/#/estado-cuenta}
      SIMIT_BROWSER_TIMEOUT_SECONDS: ${SIMIT_BROWSER_TIMEOUT_SECONDS:-75}
      SIMIT_BROWSER_HEADLESS: ${SIMIT_BROWSER_HEADLESS:-true}
      SIMIT_BROWSER_EXECUTABLE_PATH: ${SIMIT_BROWSER_EXECUTABLE_PATH:-}

  places-service:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.python-service
      args:
        SERVICE_PATH: services/places-service
        SERVICE_MODULE: places_service.main:app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8085
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      PLACES_REPOSITORY_MODE: ${PLACES_REPOSITORY_MODE:-sql}
      PLACES_DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      PLACES_AUTO_CREATE_SCHEMA: ${PLACES_AUTO_CREATE_SCHEMA:-true}
      PLACES_BOOTSTRAP_MODE: ${PLACES_BOOTSTRAP_MODE:-none}
      PLACES_AUTO_SEED_CATALOG: ${PLACES_AUTO_SEED_CATALOG:-false}
      PLACES_SEARCH_RADIUS_KM: ${PLACES_SEARCH_RADIUS_KM:-40}
      PLACES_GEOCODING_MODE: ${PLACES_GEOCODING_MODE:-disabled}
    depends_on:
      postgres:
        condition: service_healthy

  appointment-service:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.python-service
      args:
        SERVICE_PATH: services/appointment-service
        SERVICE_MODULE: appointment_service.main:app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8086
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      PLACES_SERVICE_URL: http://places-service:8085
      APPOINTMENT_REPOSITORY_MODE: ${APPOINTMENT_REPOSITORY_MODE:-sql}
      APPOINTMENT_DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      APPOINTMENT_AUTO_CREATE_SCHEMA: ${APPOINTMENT_AUTO_CREATE_SCHEMA:-true}
      EVENT_PUBLISHER_MODE: ${EVENT_PUBLISHER_MODE:-redis}
      EVENT_REDIS_URL: ${EVENT_REDIS_URL:?EVENT_REDIS_URL is required}
      EVENT_CHANNEL_PREFIX: ${EVENT_CHANNEL_PREFIX:-civi.events}
      APPOINTMENT_REMINDER_LEAD_MINUTES: ${APPOINTMENT_REMINDER_LEAD_MINUTES:-30}
      APPOINTMENT_PARTNER_REMINDER_LEAD_MINUTES: ${APPOINTMENT_PARTNER_REMINDER_LEAD_MINUTES:-60}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      places-service:
        condition: service_started
      notification-service:
        condition: service_started
      places-service:
        condition: service_started

  notification-service:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.python-service
      args:
        SERVICE_PATH: services/notification-service
        SERVICE_MODULE: notification_service.main:app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8087
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      NOTIFICATION_REPOSITORY_MODE: ${NOTIFICATION_REPOSITORY_MODE:-sql}
      NOTIFICATION_DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      NOTIFICATION_AUTO_CREATE_SCHEMA: ${NOTIFICATION_AUTO_CREATE_SCHEMA:-true}
      WHATSAPP_PROVIDER_MODE: ${WHATSAPP_PROVIDER_MODE:?WHATSAPP_PROVIDER_MODE is required}
      WHATSAPP_GRAPH_API_VERSION: ${WHATSAPP_GRAPH_API_VERSION:-v20.0}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:?WHATSAPP_ACCESS_TOKEN is required}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:?WHATSAPP_PHONE_NUMBER_ID is required}
      EVENT_PUBLISHER_MODE: ${EVENT_PUBLISHER_MODE:-redis}
      EVENT_REDIS_URL: ${EVENT_REDIS_URL:?EVENT_REDIS_URL is required}
      EVENT_CHANNEL_PREFIX: ${EVENT_CHANNEL_PREFIX:-civi.events}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  notification-worker:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.python-service
      args:
        SERVICE_PATH: services/notification-service
        SERVICE_MODULE: notification_service.main:app
    command: ["python", "-m", "notification_service.workers.reminders"]
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      NOTIFICATION_REPOSITORY_MODE: ${NOTIFICATION_REPOSITORY_MODE:-sql}
      NOTIFICATION_DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      NOTIFICATION_AUTO_CREATE_SCHEMA: ${NOTIFICATION_AUTO_CREATE_SCHEMA:-true}
      WHATSAPP_PROVIDER_MODE: ${WHATSAPP_PROVIDER_MODE:?WHATSAPP_PROVIDER_MODE is required}
      WHATSAPP_GRAPH_API_VERSION: ${WHATSAPP_GRAPH_API_VERSION:-v20.0}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:?WHATSAPP_ACCESS_TOKEN is required}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:?WHATSAPP_PHONE_NUMBER_ID is required}
      NOTIFICATION_WORKER_INTERVAL_SECONDS: ${NOTIFICATION_WORKER_INTERVAL_SECONDS:-30}
      NOTIFICATION_WORKER_LIMIT: ${NOTIFICATION_WORKER_LIMIT:-50}
      NOTIFICATION_WORKER_DISPATCH_OUTBOX: ${NOTIFICATION_WORKER_DISPATCH_OUTBOX:-true}
      EVENT_PUBLISHER_MODE: ${EVENT_PUBLISHER_MODE:-redis}
      EVENT_REDIS_URL: ${EVENT_REDIS_URL:?EVENT_REDIS_URL is required}
      EVENT_CHANNEL_PREFIX: ${EVENT_CHANNEL_PREFIX:-civi.events}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  bot-consult-worker:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.python-service
      args:
        SERVICE_PATH: services/bot-orchestrator
        SERVICE_MODULE: bot_orchestrator.main:app
    command: ["python", "-m", "bot_orchestrator.workers.consult_worker"]
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      VEHICLE_SERVICE_URL: http://vehicle-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      QUOTE_SERVICE_URL: http://quote-service:8091
      BOT_CONSULT_WORKER_INTERVAL_SECONDS: ${BOT_CONSULT_WORKER_INTERVAL_SECONDS:-5}
      BOT_CONSULT_REPOSITORY_MODE: ${BOT_CONSULT_REPOSITORY_MODE:-sql}
      BOT_CONSULT_DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      BOT_CONSULT_AUTO_CREATE_SCHEMA: ${BOT_CONSULT_AUTO_CREATE_SCHEMA:-true}
    depends_on:
      postgres:
        condition: service_healthy
      notification-service:
        condition: service_started
      vehicle-service:
        condition: service_started

  media-service:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.python-service
      args:
        SERVICE_PATH: services/media-service
        SERVICE_MODULE: media_service.main:app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8088
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      MEDIA_REPOSITORY_MODE: ${MEDIA_REPOSITORY_MODE:-sql}
      MEDIA_DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      MEDIA_AUTO_CREATE_SCHEMA: ${MEDIA_AUTO_CREATE_SCHEMA:-true}
      MEDIA_AUDIO_PROVIDER_MODE: ${MEDIA_AUDIO_PROVIDER_MODE:?MEDIA_AUDIO_PROVIDER_MODE is required}
      MEDIA_IMAGE_PROVIDER_MODE: ${MEDIA_IMAGE_PROVIDER_MODE:?MEDIA_IMAGE_PROVIDER_MODE is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
      OPENAI_AUDIO_TRANSCRIPTION_MODEL: ${OPENAI_AUDIO_TRANSCRIPTION_MODEL:-}
      OPENAI_IMAGE_VISION_MODEL: ${OPENAI_IMAGE_VISION_MODEL:-}
      OPENAI_IMAGE_EXTRACTION_PROMPT: ${OPENAI_IMAGE_EXTRACTION_PROMPT:-Extrae el texto visible de esta imagen. Responde solo el texto encontrado.}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_IMAGE_MODEL: ${DEEPSEEK_IMAGE_MODEL:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_IMAGE_MODEL: ${GROQ_IMAGE_MODEL:-}
    depends_on:
      postgres:
        condition: service_healthy

  quote-service:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.python-service
      args:
        SERVICE_PATH: services/quote-service
        SERVICE_MODULE: quote_service.main:app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8091
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}

  knowledge-service:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.python-service
      args:
        SERVICE_PATH: services/knowledge-service
        SERVICE_MODULE: knowledge_service.main:app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8094
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}

  billing-service:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.python-service
      args:
        SERVICE_PATH: services/billing-service
        SERVICE_MODULE: billing_service.main:app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8092
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}

  handoff-service:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.python-service
      args:
        SERVICE_PATH: services/handoff-service
        SERVICE_MODULE: handoff_service.main:app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8093
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}

  admin-service:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.python-service
      args:
        SERVICE_PATH: services/admin-service
        SERVICE_MODULE: admin_service.main:app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8089
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      ADMIN_AUDIT_REPOSITORY_MODE: ${ADMIN_AUDIT_REPOSITORY_MODE:-sql}
      ADMIN_DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      ADMIN_AUTO_CREATE_SCHEMA: ${ADMIN_AUTO_CREATE_SCHEMA:-true}
      ADMIN_USER: ${ADMIN_USER:?ADMIN_USER is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      CHANNEL_GATEWAY_URL: http://channel-gateway:8080
      CONVERSATION_SERVICE_URL: http://conversation-service:8081
      BOT_ORCHESTRATOR_URL: http://bot-orchestrator:8082
      VEHICLE_SERVICE_URL: http://vehicle-service:8083
      RUNT_SERVICE_URL: http://runt-service:8084
      SIMIT_SERVICE_URL: http://simit-service:8090
      PLACES_SERVICE_URL: http://places-service:8085
      APPOINTMENT_SERVICE_URL: http://appointment-service:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      MEDIA_SERVICE_URL: http://media-service:8088
      KNOWLEDGE_SERVICE_URL: http://knowledge-service:8094
      QUOTE_SERVICE_URL: http://quote-service:8091
      BILLING_SERVICE_URL: http://billing-service:8092
      HANDOFF_SERVICE_URL: http://handoff-service:8093
    ports:
      - "${ADMIN_BIND:-127.0.0.1}:${ADMIN_SERVICE_PORT:-8089}:8089"
    depends_on:
      postgres:
        condition: service_healthy

  admin-event-audit-worker:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.python-service
      args:
        SERVICE_PATH: services/admin-service
        SERVICE_MODULE: admin_service.main:app
    command: ["python", "-m", "admin_service.workers.event_audit"]
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      ADMIN_AUDIT_REPOSITORY_MODE: ${ADMIN_AUDIT_REPOSITORY_MODE:-sql}
      ADMIN_DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      ADMIN_AUTO_CREATE_SCHEMA: ${ADMIN_AUTO_CREATE_SCHEMA:-true}
      EVENT_REDIS_URL: ${EVENT_REDIS_URL:?EVENT_REDIS_URL is required}
      EVENT_CHANNEL_PREFIX: ${EVENT_CHANNEL_PREFIX:-civi.events}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  civi_postgres_data:
  civi_redis_data:
