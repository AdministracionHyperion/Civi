name: verify
on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Python service deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio httpx fastapi uvicorn sqlalchemy pydantic-settings psycopg[binary]
          python -m pip install -e packages/python-common
          for svc in services/*/ ; do
            if [ -f "$svc/pyproject.toml" ]; then
              python -m pip install -e "$svc" || true
            fi
          done
      - name: Install Node deps
        run: |
          if [ -f package.json ]; then npm ci || npm install; fi
      - name: Run verify.ps1 via pwsh
        shell: pwsh
        run: ./scripts/verify.ps1
